[server]
host = "0.0.0.0"
port = 8080
shutdown_grace_period_ms = 30000

[gateway]
# Production-style profile for an internal deployment.
default_timeout_ms = 30000
max_retries = 1
enable_request_logging = true
log_prompt_content = false
api_key_env = "RUSTYGATE_GATEWAY_API_KEY"
routing_policy = "priority"
model_aliases = { "gpt-4o" = "gpt-4o-mini", "claude-sonnet" = "claude-3-5-sonnet-latest" }

[gateway.retry]
initial_backoff_ms = 100
max_backoff_ms = 2000
jitter_ms = 50

[gateway.circuit_breaker]
failure_threshold = 3
open_duration_ms = 5000
half_open_max_probes = 1

[gateway.rate_limit]
global_requests_per_minute = 600
global_burst_size = 120
per_key_requests_per_minute = 300
per_key_burst_size = 60

[gateway.request_limits]
max_chat_body_bytes = 65536
max_messages_per_request = 64
max_message_content_chars = 8000

[storage]
enabled = true
database_url = "sqlite:///data/rustygate.db"

[[providers]]
name = "openai-primary"
kind = "openai_compatible"
model = "gpt-4o-mini"
priority = 1
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
timeout_ms = 15000
max_retries = 2
retry_initial_backoff_ms = 100
retry_max_backoff_ms = 1000
retry_jitter_ms = 50
circuit_breaker_failure_threshold = 2
circuit_breaker_open_duration_ms = 3000
circuit_breaker_half_open_max_probes = 1
cost_per_1k_input_tokens = 0.00015
cost_per_1k_output_tokens = 0.0006

[[providers]]
name = "anthropic-primary"
kind = "anthropic"
model = "claude-3-5-sonnet-latest"
priority = 2
base_url = "https://api.anthropic.com"
api_key_env = "ANTHROPIC_API_KEY"
timeout_ms = 20000
max_retries = 1
cost_per_1k_input_tokens = 0.00015
cost_per_1k_output_tokens = 0.00075
